name: Generate contribution snake SVG
on:
  schedule:
    - cron: '0 3 * * *'    # раз в сутки в 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # опция для Node.js 24
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SVGs (platane/snk)
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg

      - name: Commit generated SVGs into output folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          cp -r dist/* output/ || true
          git add output
          git commit -m "chore: update contribution snake" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed; check permissions"
