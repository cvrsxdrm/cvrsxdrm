name: Generate contribution snake SVG
on:
  schedule:
    - cron: '0 3 * * *'    # раз в сутки в 03:00 UTC
  workflow_dispatch:        # можно запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SVGs (Platane/snk)
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          output: dist
          format: svg
          palette: github

      - name: Commit generated SVGs into output folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          cp -r dist/* output/ || true
          git add output
          git commit -m "chore: update contribution snake" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed; check permissions"
