name: Generate contribution snake SVG (debug)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show git info
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          git rev-parse --abbrev-ref HEAD || true
          git status --porcelain || true

      - name: Workspace listing (before)
        run: ls -la || true

      - name: Generate SVGs (platane/snk)
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg

      - name: SNK output listing
        run: |
          echo "dist folder:"
          ls -la dist || true
          echo "first 200 bytes of svg if exists:"
          head -c 200 dist/github-contribution-grid-snake.svg || true

      - name: Commit generated SVGs into output folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          cp -r dist/* output/ || true
          echo "output folder now:"
          ls -la output || true
          git add output
          git commit -m "chore: update contribution snake" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed; check permissions"

      - name: Workspace listing (after)
        run: ls -la || true
